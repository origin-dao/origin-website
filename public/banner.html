<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1500px;
    height: 500px;
    background: #0a0a1a;
    overflow: hidden;
    position: relative;
    font-family: 'Orbitron', sans-serif;
  }

  .glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 900px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(0,240,255,0.08) 0%, transparent 70%);
  }

  .line-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent 10%, #00f0ff 50%, transparent 90%);
  }

  .line-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent 10%, rgba(0,240,255,0.3) 50%, transparent 90%);
  }

  .scan {
    position: absolute;
    top: 52%;
    left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,240,255,0.2), rgba(0,240,255,0.4), rgba(0,240,255,0.2), transparent);
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 24px;
  }

  .origin-text {
    font-weight: 900;
    font-size: 140px;
    color: #ffffff;
    letter-spacing: 24px;
    text-shadow:
      0 0 40px rgba(0,240,255,0.4),
      0 0 80px rgba(0,240,255,0.15);
  }

  .tagline {
    font-weight: 700;
    font-size: 36px;
    color: #00f0ff;
    letter-spacing: 6px;
    text-shadow: 0 0 30px rgba(0,240,255,0.5);
    text-align: center;
    line-height: 1.3;
  }

  .diamonds {
    font-size: 20px;
    color: #f5a623;
    letter-spacing: 40px;
    margin-top: -8px;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="line-top"></div>
  <div class="line-bottom"></div>
  <div class="scan"></div>

  <div class="content">
    <div class="origin-text">ORIGIN</div>
    <div class="tagline">SOVEREIGNTY IS NOT GRANTED.<br>IT IS MINTED.</div>
    <div class="diamonds">◈ ◈ ◈</div>
  </div>
</body>
</html>
