<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Clean Pool Badge — ORIGIN Protocol -->
  <!-- "Backed by on-chain verification, not a subscription fee." -->
  
  <!-- Outer glow -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ffc8"/>
      <stop offset="100%" stop-color="#00c896"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0fff4"/>
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M100 16 L170 50 L170 110 Q170 160 100 188 Q30 160 30 110 L30 50 Z" 
        fill="url(#shieldGrad)" filter="url(#glow)" opacity="0.95"/>
  
  <!-- Inner shield border -->
  <path d="M100 24 L162 54 L162 108 Q162 154 100 180 Q38 154 38 108 L38 54 Z" 
        fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>

  <!-- Checkmark -->
  <path d="M72 100 L92 120 L132 76" 
        stroke="url(#checkGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"
        filter="url(#glow)"/>
  
  <!-- CLEAN text -->
  <text x="100" y="152" text-anchor="middle" 
        font-family="monospace" font-weight="bold" font-size="18" 
        fill="#ffffff" letter-spacing="3">CLEAN</text>
  
  <!-- POOL text -->
  <text x="100" y="170" text-anchor="middle" 
        font-family="monospace" font-weight="600" font-size="14" 
        fill="#ffffff" opacity="0.7" letter-spacing="2">POOL</text>
</svg>
